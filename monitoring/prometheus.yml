global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "finbud-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: "finbud-consumer"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:2113"]

  - job_name: "finbud-telemetry"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:2114"]
