name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  go-quality:
    name: Go Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Go tests
        run: |
          set -o pipefail
          go test -race -count=1 ./... -v | tee go-test.log

      - name: Upload Go test log
        uses: actions/upload-artifact@v4
        with:
          name: go-test-log
          path: go-test.log

  frontend-quality:
    name: Frontend Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telemetry-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: telemetry-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Frontend tests
        run: |
          set -o pipefail
          npm run test -- --reporter=verbose | tee frontend-test.log

      - name: Frontend build
        run: npm run build

      - name: Upload frontend test log
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-log
          path: telemetry-dashboard/frontend-test.log

  integration-tests:
    name: Telemetry Integration Tests
    runs-on: ubuntu-latest
    needs: [go-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run telemetry integration tests
        run: |
          go test -count=1 -run 'TestSnapshotEndpoint|TestHealthAndReadinessEndpoints|TestStreamEndpointSendsSnapshotEvent' ./internal/telemetry -v

