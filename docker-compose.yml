# FinBud — Local Development Infrastructure
# Usage: docker-compose up -d
#
# Services:
#   - PostgreSQL 16  (port 5432)
#   - Redis 7        (port 6379)
#   - Kafka (KRaft)  (port 9092)  — no Zookeeper needed
services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finbud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finbud
      POSTGRES_PASSWORD: finbud_secret
      POSTGRES_DB: finbud_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # NOTE: migrations/001_init_schema.sql is kept as reference only.
      # GORM AutoMigrate handles schema creation at app startup.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finbud -d finbud_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finbud-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Kafka (KRaft mode — no Zookeeper) ──────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: finbud-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # KRaft mode settings
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Auto-create topics for development convenience
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafkadata:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  kafkadata:

