# FinBud — Local Development Infrastructure
# Usage: docker-compose up -d
#
# Services:
#   - PostgreSQL 16  (port 5432)
#   - Redis 7        (port 6379)
#   - Kafka (KRaft)  (port 9092)  — no Zookeeper needed
services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finbud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finbud
      POSTGRES_PASSWORD: finbud_secret
      POSTGRES_DB: finbud_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # NOTE: migrations/001_init_schema.sql is kept as reference only.
      # GORM AutoMigrate handles schema creation at app startup.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finbud -d finbud_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finbud-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Kafka (KRaft mode — no Zookeeper) ──────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: finbud-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # KRaft mode settings
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Auto-create topics for development convenience
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafkadata:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  telemetry:
    image: golang:1.23
    container_name: finbud-telemetry
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "go run ./cmd/telemetry"
    environment:
      TELEMETRY_PORT: 8081
      TELEMETRY_METRICS_PORT: 2114
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
      - "2114:2114"

  telemetry-dashboard:
    image: node:22-alpine
    container_name: finbud-telemetry-dashboard
    working_dir: /app/telemetry-dashboard
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - telemetry
    ports:
      - "5173:5173"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: finbud-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: finbud-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  pgdata:
  kafkadata:
  promdata:
  grafanadata:

